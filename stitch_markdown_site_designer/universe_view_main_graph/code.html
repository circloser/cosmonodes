<script>
        // Stars Background Implementation
        const canvas = document.getElementById('background-stars');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function initStars() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            stars = [];
            for (let i = 0; i < 400; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: Math.random() * 0.05
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#FFFFFF';
            stars.forEach(star => {
                ctx.globalAlpha = star.opacity;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.opacity += star.speed;
                if (star.opacity > 1 || star.opacity < 0) star.speed *= -1;
            });
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animateStars();

        // Constellation Lines logic
        const svg = document.getElementById('constellation-svg');
        const centerNode = document.getElementById('center-node');
        const nodes = document.querySelectorAll('[data-node]');

        function drawLines() {
            svg.innerHTML = `
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
            `;
            const centerRect = centerNode.getBoundingClientRect();
            const cx = centerRect.left + centerRect.width / 2;
            const cy = centerRect.top + centerRect.height / 2;

            nodes.forEach(node => {
                const rect = node.getBoundingClientRect();
                const nx = rect.left + rect.width / 2;
                const ny = rect.top + rect.height / 2;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', cx);
                line.setAttribute('y1', cy);
                line.setAttribute('x2', nx);
                line.setAttribute('y2', ny);
                line.setAttribute('stroke', 'rgba(129, 140, 248, 0.3)');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('class', 'constellation-line');
                line.setAttribute('filter', 'url(#glow)');
                svg.appendChild(line);
            });
        }

        // Initial draw and redraw on resize
        setTimeout(drawLines, 100);
        window.addEventListener('resize', drawLines);

        // Interaction for Node Details
        const nodeCard = document.getElementById('node-card');
        const closeCard = document.getElementById('close-card');

        nodes.forEach(node => {
            node.addEventListener('click', (e) => {
                const rect = node.getBoundingClientRect();
                nodeCard.style.top = `${rect.top - 180}px`;
                nodeCard.style.left = `${rect.left - 100}px`;
                nodeCard.classList.remove('hidden');
                setTimeout(() => {
                    nodeCard.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
            });
        });

        closeCard.addEventListener('click', () => {
            nodeCard.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                nodeCard.classList.add('hidden');
            }, 300);
        });

        // Add Star Animation (Supernova)
        const addStarBtn = document.getElementById('add-star-btn');
        const flash = document.getElementById('supernova-flash');

        addStarBtn.addEventListener('click', () => {
            flash.classList.add('supernova-active');
            setTimeout(() => {
                flash.classList.remove('supernova-active');
                // Simulate adding a node
                alert("Seeking new stellar connections in the quadrant...");
            }, 800);
        });

        // Simple Pan Interaction
        const container = document.getElementById('graph-container');
        const canvasEl = document.getElementById('nodes-canvas');
        let isDragging = false;
        let startX, startY, scrollX = 0, scrollY = 0;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - scrollX;
            startY = e.clientY - scrollY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            scrollX = e.clientX - startX;
            scrollY = e.clientY - startY;
            canvasEl.style.transform = `translate(${scrollX}px, ${scrollY}px)`;
            drawLines(); // Update lines as we move
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

    </script>
